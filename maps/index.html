<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Open Service Address</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #080b12; color: #fff; }
    main { width: min(100%, 440px); padding: 28px; border: 1px solid #293247; border-radius: 22px; background: #111725; box-shadow: 0 18px 60px #0008; }
    h1 { margin: 0 0 10px; font-size: 1.55rem; }
    p { margin: 0 0 24px; color: #bac4d8; line-height: 1.5; overflow-wrap: anywhere; }
    .buttons { display: grid; gap: 12px; }
    a { display: block; padding: 14px 18px; border-radius: 12px; text-align: center; color: #fff; font-weight: 750; text-decoration: none; background: #5271ff; }
    a:last-child { background: #fff; color: #111725; }
    [hidden] { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Open service address</h1>
    <p id="address">Choose your preferred maps app.</p>
    <div class="buttons" id="buttons" hidden>
      <a id="appleMaps" rel="noopener">Open in Apple Maps</a>
      <a id="googleMaps" rel="noopener">Open in Google Maps</a>
    </div>
  </main>
  <script>
    const address = new URLSearchParams(location.search).get('address')?.trim();
    if (address) {
      document.getElementById('address').textContent = address;
      document.getElementById('appleMaps').href = `https://maps.apple.com/?q=${encodeURIComponent(address)}`;
      document.getElementById('googleMaps').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
      document.getElementById('buttons').hidden = false;
    } else {
      document.getElementById('address').textContent = 'No address was included in this link.';
    }
  </script>
</body>
</html>
